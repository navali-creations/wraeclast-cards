name: Cloudflare Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  deployments: write
  pull-requests: write
  issues: write

concurrency:
  group: cloudflare-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}

    steps:
      - name: Wait for Cloudflare preview to appear
        run: sleep 30

      - name: Find Cloudflare preview deployment
        id: cf
        uses: actions/github-script@v9
        with:
          script: |
            const branch = context.payload.pull_request.head.ref
            const sha = context.payload.pull_request.head.sha
            const accountId = process.env.CLOUDFLARE_ACCOUNT_ID
            const token = process.env.CLOUDFLARE_API_TOKEN
            const project = process.env.CLOUDFLARE_PROJECT_NAME

            if (!accountId || !token || !project) {
              core.setFailed("Missing CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN, or CLOUDFLARE_PROJECT_NAME.")
              return
            }

            const url = `https://api.cloudflare.com/client/v4/accounts/${accountId}/pages/projects/${project}/deployments?page=1&per_page=100`

            const res = await fetch(url, {
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
            })

            if (!res.ok) {
              core.setFailed(`Cloudflare API failed: ${res.status} ${await res.text()}`)
              return
            }

            const json = await res.json()
            const deployments = Array.isArray(json.result) ? json.result : []

            function getBranch(d) {
              return d?.deployment_trigger?.metadata?.branch ?? null
            }

            function getSha(d) {
              return d?.deployment_trigger?.metadata?.commit_hash ?? null
            }

            function getUrl(d) {
              return d?.url ?? null
            }

            const previews = deployments
              .filter((d) =>
                d?.environment === "preview" &&
                getBranch(d) === branch &&
                getUrl(d)
              )
              .sort((a, b) => new Date(b.created_on) - new Date(a.created_on))

            const exact = previews.find((d) => getSha(d) === sha)
            const chosen = exact || previews[0]

            if (!chosen) {
              core.setOutput("found", "false")
              return
            }

            core.setOutput("found", "true")
            core.setOutput("url", getUrl(chosen))
            core.setOutput("status", chosen?.latest_stage?.status || "success")

      - name: Fail if preview was not found
        if: steps.cf.outputs.found != 'true'
        run: |
          echo "No Cloudflare preview deployment found for this PR branch yet."
          exit 1

      - name: Mark previous GitHub deployments as inactive
        uses: actions/github-script@v9
        with:
          script: |
            const envName = `preview/pr-${context.payload.pull_request.number}`
            const currentSha = context.payload.pull_request.head.sha

            const deployments = await github.paginate(
              github.rest.repos.listDeployments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment: envName,
                per_page: 100,
              }
            )

            for (const deployment of deployments) {
              if (deployment.sha === currentSha) continue

              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                state: "inactive",
                environment: envName,
                description: `Superseded by ${currentSha.slice(0, 7)}`,
                log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              })
            }

      - name: Create GitHub deployment
        id: gh_deploy
        uses: actions/github-script@v9
        with:
          script: |
            const envName = `preview/pr-${context.payload.pull_request.number}`
            const ref = context.payload.pull_request.head.sha

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
              environment: envName,
              description: "Cloudflare Pages preview",
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false
            })

            core.setOutput("deployment_id", String(deployment.data.id))
            core.setOutput("environment", envName)

      - name: Mark GitHub deployment successful
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number("${{ steps.gh_deploy.outputs.deployment_id }}"),
              state: "success",
              environment: "${{ steps.gh_deploy.outputs.environment }}",
              environment_url: "${{ steps.cf.outputs.url }}",
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: "Cloudflare Pages preview is ready"
            })

      - name: Find existing preview comment
        id: find_comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- cloudflare-preview-comment -->"

      - name: Create or update PR comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- cloudflare-preview-comment -->
            ## Cloudflare Pages Preview

            Preview: ${{ steps.cf.outputs.url }}

            GitHub deployment environment: `${{ steps.gh_deploy.outputs.environment }}`
            Commit: `${{ github.event.pull_request.head.sha }}`
            Branch: `${{ github.event.pull_request.head.ref }}`

      - name: Mark GitHub deployment failed if a previous step failed
        if: failure() && steps.gh_deploy.outputs.deployment_id != ''
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number("${{ steps.gh_deploy.outputs.deployment_id }}"),
              state: "failure",
              environment: "${{ steps.gh_deploy.outputs.environment }}",
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: "Failed to resolve Cloudflare Pages preview"
            })
